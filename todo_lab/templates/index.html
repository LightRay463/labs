<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>To-Do</title>
</head>
<body>
    <h1>Мой To-Do</h1>

    <form action="/add" method="post">
        <input type="text" name="title" placeholder="Новая задача">
        <button type="submit">Добавить</button>
    </form>

    <h2>Список задач</h2>

    <ul>
        {% for task in tasks %}
            <li>#{{ task[0] }} - {{ task[1] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
