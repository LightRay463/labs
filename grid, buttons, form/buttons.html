<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>buttons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
	<style type="text/css">
		.btn-square {
			border-radius: 0px;
		}
        .btn-pill {
            padding-right: 20px; 40px;
            padding-left: 20px;
            border-radius: 50px;
        }
	</style>
</head>
<body>
    <div class="col">
        <button type="button" class="btn btn-primary">Button</button>
        <button type="button" class="btn btn-secondary">Button</button>
        <button type="button" class="btn btn-success">Button</button>
        <button type="button" class="btn btn-warning">Button</button>
        <button type="button" class="btn btn-danger">Button</button>
    </div>
    <div class="row">
        <div class="col">ㅤ</div>
    </div>
    <div class="col">
        <button type="button" class="btn btn-primary btn-pill">Button</button>
        <button type="button" class="btn btn-secondary btn-pill">Button</button>
        <button type="button" class="btn btn-success btn-pill">Button</button>
        <button type="button" class="btn btn-warning btn-pill">Button</button>
        <button type="button" class="btn btn-danger btn-pill">Button</button>
    </div>
    <div class="row">
        <div class="col">ㅤ</div>
    </div>
    <div class="col">
        <button type="button" class="btn btn-primary btn-square">Button</button>
        <button type="button" class="btn btn-secondary btn-square">Button</button>
        <button type="button" class="btn btn-success btn-square">Button</button>
        <button type="button" class="btn btn-outline-primary">Button</button>
        <button type="button" class="btn btn-outline-secondary">Button</button>
        <button type="button" class="btn btn-outline-success">Button</button>
    </div>
    <div class="row">
        <div class="col">ㅤ</div>
    </div>
    <div class="d-grid gap-2">
        <button type="button" class="btn btn-primary btn-square">Button</button>
    </div>
</body>
</html>
