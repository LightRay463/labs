<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="row">
        <div class="col-4">
            <label for="formGroupExampleInput" class="form-label">Owner</label>

        </div>
        <div class="col-2">
            <label for="formGroupExampleInput2" class="form-label">CVV</label>
            <input type="text" class="form-control" id="formGroupExampleInput2">
        </div>
        <div class="row">
            <div class="col">ㅤ</div>
        </div>
        <div class="col-6">
            <label for="formGroupExampleInput2" class="form-label">Card Number</label>
            <input type="text" class="form-control" id="formGroupExampleInput3">
        </div>
        <div class="row">
            <div class="col">ㅤ</div>
        </div>
        <div class="col-1">
            <label for="formGroupExampleInput2" class="form-label">Expiration Date</label>
            <select class="form-select" id="floatingSelect" aria-label="Floating label select example">
                <option selected>January</option>
                <option value="1">Один</option>
                <option value="2">Два</option>
                <option value="3">Три</option>
            </select>
        </div>
        <div class="col-1">

                <option selected>2017</option>

                <option value="3">2014</option>
            </select>
        </div>
        <div class="row">
            <div class="col">ㅤ</div>
        </div>
        <div class="col">
            <button type="button" class="btn btn-success">Confirm</button>
        </div>
    </div>
</body>
</html>
